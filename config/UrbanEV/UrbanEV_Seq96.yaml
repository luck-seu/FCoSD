# --------- General Configs ---------
GENERAL:
  runner: 'FCoSDRunner'
  task_name: 'LTSF'
  mode: 'train'
  batch_size: 32
  max_epochs: 10
  early_stop_patience: 3


# --------- Data Configs ---------
DATA:
  in_steps: 96
  out_steps: 96
  x_time_of_day: True
  x_day_of_week: True
  y_time_of_day: True
  y_day_of_week: True


# --------- Training Configs ---------
# TODO: Support more loss functions
OPTIM:
  loss: 'MSE'
  initial_lr: 0.0005
  weight_decay: 0.001
  lr_scheduler_type: 'ExponentialLR'
  lr_scheduler_gamma: 0.5
  clip_grad: 5.0


# --------- Model Configs ---------
# TODO: Add ablation settings.
MODEL_PARAM:
  history_seq_len: 96
  future_seq_len: 96
  num_channels: 275
  d_model: 512
  e_layers: 2
  ffn_activation: 'gelu'
  use_norm: True
  emb_dropout: 0.2
  d_state: 64
  d_conv: 2
  expand: 3
  d_ff: 512
  ffn_dropout: 0.2
  num_bands: 3
  rank: 8
  freq_bands:
    - [0, 0.05]
    - [0.05, 0.1]
    - [0.1, 0.5]
  input_dim: 256
  spatial_dim: 128
  tod_dim: 64
  dow_dim: 64
  lap_dim: 28
  headdim: 64
  d_inner: 0
  rank2: 32
  node_dim: 64
  d_band: 8
  op_w: 0.01
  shared_band: True
  use_adj: True
  use_mamba2: True
  use_mvg: False
  use_rnn: False